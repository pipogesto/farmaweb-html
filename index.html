<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FarmaPlus - Tu Farmacia de Confianza</title>
    <link rel="stylesheet" href="stylefarma.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-14K41FWMPE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-14K41FWMPE');
    </script>
</head>
<body>
    <div id="root">
        <header class="site-header">
            <div class="top-bar">
                <div class="container">
                    <div class="top-bar-content">
                        <div class="contact-info">
                            <a href="tel:+525523697940" class="contact-item">
                                <i data-lucide="phone"></i>
                                <span>+52 55 23 69 79 40</span>
                            </a>
                            <div class="contact-item">
                                <i data-lucide="map-pin"></i>
                                <span>Calle 67 #16 duplex</span>
                            </div>
                            <div class="contact-item">
                                <i data-lucide="clock"></i>
                                <span>Lun-Sáb: 9:00 - 22:00</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="main-header">
                <div class="container">
                    <div class="main-header-content">
                        <a href="#" data-page="inicio" class="logo">
                            <div class="logo-icon">⚕️</div>
                            <div>
                                <h1 class="logo-title">FarmaPlus</h1>
                                <p class="logo-subtitle">Tu farmacia de confianza</p>
                            </div>
                        </a>
                        <div class="search-bar">
                            <i data-lucide="search" class="search-icon"></i>
                            <input type="text" placeholder="Buscar medicamentos, productos..." class="search-input" id="desktop-search-input" />
                        </div>
                        <div class="header-actions">
                            <a href="admin.html" class="icon-button admin-button" title="Panel de Control" style="color: #2563eb;">
                                <i data-lucide="layout-dashboard"></i>
                            </a>
                           
                            <button class="icon-button mobile-search-button">
                                <i data-lucide="search"></i>
                            </button>

                            <!-- MODIFICACIÓN AQUÍ: carrito reutilizado para admin → estadísticas -->
                            <a href="#" data-page="carrito" id="cartButton" class="icon-button cart-button">
                                <i data-lucide="shopping-cart" id="cart-icon"></i>
                                <span class="cart-badge">0</span>
                            </a>
                           
                            <div class="login-button-container" data-context="desktop">
                                <a href="#" data-page="login" class="login-button">
                                    <i data-lucide="user"></i>
                                    <span>Iniciar Sesión</span>
                                </a>
                            </div>
                           
                            <button class="icon-button mobile-menu-button">
                                <i data-lucide="menu"></i>
                            </button>
                        </div>
                    </div>
                    <nav class="nav-desktop">
                        <a href="#" data-page="inicio" class="nav-link active">Inicio</a>
                        <a href="#" data-page="catalogo" class="nav-link">Catálogo</a>
                        <a href="#" data-page="nosotros" class="nav-link">Nosotros</a>
                        <a href="#" data-page="contacto" class="nav-link">Contacto</a>
                    </nav>
                </div>
            </div>
            <nav class="nav-mobile hidden" id="mobile-menu">
                <a href="#" data-page="inicio" class="nav-link active">Inicio</a>
                <a href="#" data-page="catalogo" class="nav-link">Catálogo</a>
                <a href="#" data-page="nosotros" class="nav-link">Nosotros</a>
                <a href="#" data-page="contacto" class="nav-link">Contacto</a>
                <a href="admin.html" class="nav-link" style="color: #2563eb; font-weight: bold;">
                    <i data-lucide="layout-dashboard" style="display: inline-block; vertical-align: middle; margin-right: 8px;"></i>Panel Admin
                </a>
               
                <hr class="login-separator">
                <div class="login-button-container" data-context="mobile">
                    <a href="#" data-page="login" class="nav-link">Iniciar Sesión</a>
                    <a href="#" data-page="registro" class="nav-link">Registrarse</a>
                </div>
            </nav>
        </header>
       
        <main class="flex-1">
        </main>
       
        <footer class="site-footer">
            <!-- ... (el footer se mantiene igual, no lo modifiqué) ... -->
        </footer>
    </div>
    <script src="script.js" type="module"></script>
    <script>
        // Inicializar iconos de Lucide para los nuevos elementos
        lucide.createIcons();
    </script>
</body>
</html>
